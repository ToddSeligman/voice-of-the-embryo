        const _a = '10045e0c0717480c121b495c1f405c7d343b02140e125032530234305d05057c24021b06332c025809261e56057a5966002d433b1356225910164a36797148465b212325191a043d283e2130705179624e05385528315520281934096a011f464e0e04402e2733010b33382e';
        const _e = '500c15090c54035d00414a0b50020705575b175a0d5b555b0745495d54510450520b4b555f01045d03451f570b510500545f110c0a56500800424e560608000e';

        // Decode keys
        function _d(hex, key) {
            const bytes = hex.match(/.{2}/g).map(h => parseInt(h, 16));
            return bytes.map((b, i) => String.fromCharCode(b ^ key.charCodeAt(i % key.length))).join('');
        }

        const ANTHROPIC_KEY = _d(_a, _k);
        const ELEVENLABS_KEY = _d(_e, _k);
        const ELEVENLABS_VOICE_ID = 'm3yAHyFEFKtbCIM5n7GF';

        // ============================================================
        // STATE & GLOBALS
        // ============================================================

        let audioCtx = null;
        let isListening = false;
        let isProcessing = false;
        let isSpeaking = false;
        let currentAudioBuffer = null;
        let currentAudioSource = null;
        let recognitionSupported = false;
        let recognition = null;
        let finalTranscript = '';
        let manualStop = false;
        let conversationHistory = [];
        let chatMessages = [];

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        // Voice settings
        let voiceSettings = {
            stability: 0.5,
            similarityBoost: 0.75,
            styleExaggeration: 0,
            autoSpeak: true,
            projectContext: ''
        };

        // DOM Elements
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('statusText');
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOpenBtn = document.getElementById('settingsOpenBtn');
        const settingsCloseBtn = document.getElementById('settingsCloseBtn');
        const textInputRow = document.getElementById('textInputRow');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const keyboardToggle = document.getElementById('keyboardToggle');
        const audioPlayback = document.getElementById('audioPlayback');
        const stabilitySlider = document.getElementById('stabilitySlider');
        const similaritySlider = document.getElementById('similaritySlider');
        const styleSlider = document.getElementById('styleSlider');
        const stabilityValue = document.getElementById('stabilityValue');
        const similarityValue = document.getElementById('similarityValue');
        const styleValue = document.getElementById('styleValue');
        const autoSpeakToggle = document.getElementById('autoSpeakToggle');
        const projectContextArea = document.getElementById('projectContext');
        const shareBtn = document.getElementById('shareBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');

        // ============================================================
        // INITIALIZATION
        // ============================================================

        function init() {
            loadSettings();
            setupSpeechRecognition();
            setupEventListeners();
            updateSliderDisplays();
            setMicButtonSize();
            window.addEventListener('resize', setMicButtonSize);
        }

        function setMicButtonSize() {
            if (window.innerWidth >= 768) {
                micBtn.classList.remove('mobile');
                micBtn.classList.add('desktop');
            } else {
                micBtn.classList.remove('desktop');
                micBtn.classList.add('mobile');
            }
        }

        // ============================================================
        // AUDIO CONTEXT INITIALIZATION
        // ============================================================

        function initAudioContext() {
            if (audioCtx) return audioCtx;

            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();

                // Resume on iOS if suspended
                if (isIOS && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                return audioCtx;
            } catch (e) {
                console.error('AudioContext initialization failed:', e);
                return null;
            }
        }

        // ============================================================
        // SPEECH RECOGNITION
        // ============================================================

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                console.log('Speech Recognition not supported');
                recognitionSupported = false;
                return;
            }

            recognitionSupported = true;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                finalTranscript = '';
                manualStop = false;
                updateMicButtonState('listening');
                statusText.textContent = 'Listening... tap mic when done';
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                        statusText.textContent = `You: ${finalTranscript}`;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (interimTranscript && !event.results[event.results.length - 1].isFinal) {
                    statusText.textContent = `Listening: ${interimTranscript}`;
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isListening = false;
                finalTranscript = '';
                manualStop = false;
                updateMicButtonState('idle');
                statusText.textContent = 'Error listening. Try again.';
            };

            recognition.onend = () => {
                isListening = false;

                if (manualStop) {
                    const spokenText = finalTranscript.trim();
                    finalTranscript = '';
                    manualStop = false;

                    if (spokenText && !isProcessing) {
                        addMessageToChat('user', spokenText);
                        getEmbryoResponse(spokenText);
                    } else if (!isProcessing) {
                        updateMicButtonState('idle');
                    }
                } else {
                    // Browser killed recognition unexpectedly (e.g. timeout)
                    // Restart it if we haven't manually stopped
                    if (!isProcessing && finalTranscript.trim()) {
                        // Keep listening - restart recognition
                        try {
                            recognition.start();
                        } catch(e) {
                            // If restart fails, process what we have
                            const spokenText = finalTranscript.trim();
                            finalTranscript = '';
                            if (spokenText) {
                                addMessageToChat('user', spokenText);
                                getEmbryoResponse(spokenText);
                            } else {
                                updateMicButtonState('idle');
                            }
                        }
                    } else if (!isProcessing) {
                        updateMicButtonState('idle');
                    }
                }
            };
        }

        // ============================================================
        // MIC BUTTON & VOICE INTERACTION
        // ============================================================

        function updateMicButtonState(state) {
            micBtn.classList.remove('idle', 'listening', 'thinking', 'speaking', 'disabled');

            if (state === 'idle' && !isProcessing) {
                micBtn.classList.add('idle');
            } else if (state === 'listening') {
                micBtn.classList.add('listening');
            } else if (state === 'thinking') {
                micBtn.classList.add('thinking');
            } else if (state === 'speaking') {
                micBtn.classList.add('speaking');
            } else if (state === 'disabled') {
                micBtn.classList.add('disabled');
            }
        }

        function startListening() {
            if (!recognitionSupported || isProcessing) return;

            // Toggle: if already listening, stop and send
            if (isListening) {
                stopListening();
                return;
            }

            initAudioContext();

            // Hide welcome screen on first interaction
            if (welcomeScreen.parentElement) {
                welcomeScreen.style.display = 'none';
            }

            try {
                navigator.vibrate(50);
            } catch (e) {}

            if (recognition) {
                recognition.start();
            }
        }

        function stopListening() {
            if (!isListening || !recognition) return;

            try {
                navigator.vibrate(50);
            } catch (e) {}

            manualStop = true;
            recognition.stop();
        }

        // ============================================================
        // API CALLS
        // ============================================================

        async function getEmbryoResponse(userMessage) {
            isProcessing = true;
            updateMicButtonState('thinking');
            statusText.textContent = 'The Embryo is thinking...';

            try {
                // Add user message to history
                conversationHistory.push({
                    role: 'user',
                    content: userMessage
                });

                // Prepare system prompt with context
                let effectiveSystemPrompt = SYSTEM_PROMPT;
                if (voiceSettings.projectContext.trim()) {
                    effectiveSystemPrompt += `\n\nProject Context: ${voiceSettings.projectContext}`;
                }

                // Call Claude API
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': ANTHROPIC_KEY,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 700,
                        system: effectiveSystemPrompt,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    console.error('API error:', error);
                    statusText.textContent = 'Error getting response. Try again.';
                    isProcessing = false;
                    updateMicButtonState('idle');
                    return;
                }

                const data = await response.json();
                const embryoMessage = data.content[0].text;

                // Add to history
                conversationHistory.push({
                    role: 'assistant',
                    content: embryoMessage
                });

                // Display message immediately
                addMessageToChat('embryo', embryoMessage);

                // Start voice generation immediately
                if (voiceSettings.autoSpeak) {
                    generateAndPlayVoice(embryoMessage);
                } else {
                    isProcessing = false;
                    updateMicButtonState('idle');
                    statusText.textContent = 'Ready to listen';
                }

            } catch (error) {
                console.error('Error:', error);
                statusText.textContent = 'Connection error. Try again.';
                isProcessing = false;
                updateMicButtonState('idle');
            }
        }

        async function generateAndPlayVoice(text) {
            updateMicButtonState('thinking');
            statusText.textContent = 'Generating voice...';

            try {
                const response = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + ELEVENLABS_VOICE_ID + '?optimize_streaming_latency=0', {
                    method: 'POST',
                    headers: {
                        'xi-api-key': ELEVENLABS_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: 'eleven_flash_v2_5',
                        voice_settings: {
                            stability: voiceSettings.stability,
                            similarity_boost: voiceSettings.similarityBoost,
                            style: voiceSettings.styleExaggeration,
                            use_speaker_boost: true
                        }
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    console.error('TTS error:', error);
                    statusText.textContent = 'Error generating voice. Try text input.';
                    isProcessing = false;
                    updateMicButtonState('idle');
                    return;
                }

                const blob = await response.blob();
                playAudioBlob(blob);

            } catch (error) {
                console.error('Error generating voice:', error);
                statusText.textContent = 'Error generating voice.';
                isProcessing = false;
                updateMicButtonState('idle');
            }
        }

        function playAudioBlob(blob) {
            if (!audioCtx) {
                initAudioContext();
            }

            if (!audioCtx) {
                // Fallback to HTML5 audio
                const url = URL.createObjectURL(blob);
                audioPlayback.src = url;
                audioPlayback.play().catch(e => {
                    console.error('Playback error:', e);
                    isProcessing = false;
                    updateMicButtonState('idle');
                    statusText.textContent = 'Ready to listen';
                });
                return;
            }

            isSpeaking = true;
            updateMicButtonState('speaking');
            statusText.textContent = 'The Embryo is speaking...';

            const reader = new FileReader();
            reader.onload = (e) => {
                audioCtx.decodeAudioData(e.target.result, (buffer) => {
                    currentAudioBuffer = buffer;

                    // Also set up HTML5 audio for replay
                    const url = URL.createObjectURL(blob);
                    audioPlayback.src = url;

                    // Play through AudioContext
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    currentAudioSource = source;

                    source.onended = () => {
                        isSpeaking = false;
                        updateMicButtonState('idle');
                        statusText.textContent = 'Ready to listen';
                        isProcessing = false;
                    };

                    source.start(0);

                }, (error) => {
                    console.error('Decode error:', error);
                    isSpeaking = false;
                    isProcessing = false;
                    updateMicButtonState('idle');
                    statusText.textContent = 'Error playing audio.';
                });
            };
            reader.readAsArrayBuffer(blob);
        }

        // ============================================================
        // CHAT DISPLAY
        // ============================================================

        function addMessageToChat(role, text) {
            // Remove welcome screen
            if (welcomeScreen.parentElement) {
                welcomeScreen.remove();
            }

            const message = document.createElement('div');
            message.className = `message ${role}`;

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            message.appendChild(content);
            chatContainer.appendChild(message);

            // Auto-scroll to bottom
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 0);

            chatMessages.push({ role, text });
            saveChat();
        }

        // ============================================================
        // SETTINGS & STORAGE
        // ============================================================

        function loadSettings() {
            try {
                const saved = localStorage.getItem('embryo-settings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    voiceSettings = { ...voiceSettings, ...settings };
                }

                const savedChat = localStorage.getItem('embryo-chat');
                if (savedChat) {
                    chatMessages = JSON.parse(savedChat);
                    // Rebuild chat display
                    if (chatMessages.length > 0) {
                        welcomeScreen.style.display = 'none';
                        chatMessages.forEach(msg => {
                            const msgEl = document.createElement('div');
                            msgEl.className = `message ${msg.role}`;
                            const content = document.createElement('div');
                            content.className = 'message-content';
                            content.textContent = msg.text;
                            msgEl.appendChild(content);
                            chatContainer.appendChild(msgEl);
                        });
                    }
                }
            } catch (e) {
                console.error('Error loading settings:', e);
            }

            // Update UI from settings
            stabilitySlider.value = voiceSettings.stability;
            similaritySlider.value = voiceSettings.similarityBoost;
            styleSlider.value = voiceSettings.styleExaggeration;
            autoSpeakToggle.classList.toggle('on', voiceSettings.autoSpeak);
            projectContextArea.value = voiceSettings.projectContext;
        }

        function saveSettings() {
            voiceSettings.stability = parseFloat(stabilitySlider.value);
            voiceSettings.similarityBoost = parseFloat(similaritySlider.value);
            voiceSettings.styleExaggeration = parseFloat(styleSlider.value);
            voiceSettings.projectContext = projectContextArea.value;

            try {
                localStorage.setItem('embryo-settings', JSON.stringify(voiceSettings));
            } catch (e) {
                console.error('Error saving settings:', e);
            }
        }

        function saveChat() {
            try {
                localStorage.setItem('embryo-chat', JSON.stringify(chatMessages));
            } catch (e) {
                console.error('Error saving chat:', e);
            }
        }

        function updateSliderDisplays() {
            stabilityValue.textContent = stabilitySlider.value;
            similarityValue.textContent = similaritySlider.value;
            styleValue.textContent = styleSlider.value;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        function setupEventListeners() {
            // Mic button
            micBtn.addEventListener('click', startListening);

            // Text input
            sendBtn.addEventListener('click', () => {
                const message = textInput.value.trim();
                if (message) {
                    addMessageToChat('user', message);
                    textInput.value = '';
                    getEmbryoResponse(message);
                }
            });

            textInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendBtn.click();
                }
            });

            // Keyboard toggle
            keyboardToggle.addEventListener('click', () => {
                textInputRow.classList.toggle('hidden');
                keyboardToggle.classList.toggle('active');
            });

            // Starter questions
            document.querySelectorAll('.starter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const question = e.target.dataset.question;
                    addMessageToChat('user', question);
                    getEmbryoResponse(question);
                });
            });

            // Settings
            settingsOpenBtn.addEventListener('click', () => {
                settingsPanel.classList.add('open');
            });

            settingsCloseBtn.addEventListener('click', () => {
                settingsPanel.classList.remove('open');
                saveSettings();
            });

            // Slider updates
            stabilitySlider.addEventListener('input', updateSliderDisplays);
            similaritySlider.addEventListener('input', updateSliderDisplays);
            styleSlider.addEventListener('input', updateSliderDisplays);
            projectContextArea.addEventListener('change', saveSettings);

            // Auto-speak toggle
            autoSpeakToggle.addEventListener('click', () => {
                voiceSettings.autoSpeak = !voiceSettings.autoSpeak;
                autoSpeakToggle.classList.toggle('on', voiceSettings.autoSpeak);
                saveSettings();
            });

            // Share button
            shareBtn.addEventListener('click', async () => {
                const url = window.location.href.split('#')[0];
                try {
                    if (navigator.share) {
                        await navigator.share({
                            title: 'Voice of the Embryo',
                            text: 'Talk to the Cosmic Embryo',
                            url: url
                        });
                    } else {
                        // Fallback: copy to clipboard
                        await navigator.clipboard.writeText(url);
                        statusText.textContent = 'Link copied to clipboard';
                        setTimeout(() => {
                            statusText.textContent = 'Ready to listen';
                        }, 2000);
                    }
                } catch (e) {
                    console.error('Share error:', e);
                }
            });

            // Clear chat
            clearChatBtn.addEventListener('click', () => {
                if (confirm('Clear all chat history? This cannot be undone.')) {
                    chatMessages = [];
                    conversationHistory = [];
                    chatContainer.innerHTML = '';
                    chatContainer.appendChild(welcomeScreen);
                    welcomeScreen.style.display = 'flex';
                    saveChat();
                    settingsPanel.classList.remove('open');
                    statusText.textContent = 'Chat cleared';
                }
            });

            // Close settings on click outside
            settingsPanel.addEventListener('click', (e) => {
                if (e.target === settingsPanel) {
                    settingsPanel.classList.remove('open');
                    saveSettings();
                }
            });
        }

        // ============================================================
        // START
        // ============================================================

        init();
    </script>
</body>
